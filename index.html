<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Juego Hub - Oppenheimer Park</title>
    <!-- Librerías de Producción -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-card { animation: fadeIn 0.4s ease-out forwards; }
        .perspective-1000 { perspective: 1000px; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root">
        <div class="flex items-center justify-center min-h-screen">
            <div class="text-center">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-rose-600 mb-4"></div>
                <p class="text-slate-400 font-bold">Cargando Centro de Juegos...</p>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // Componente de Icono corregido para evitar errores de "removeChild"
        const Icon = ({ name, color, size = 20 }) => {
            const iconRef = useRef(null);
            
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    // Limpiamos el contenido previo manualmente para que React no se confunda
                    iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        root: iconRef.current,
                        attrs: {
                            color: color,
                            width: size,
                            height: size,
                            'stroke-width': 2
                        }
                    });
                }
            }, [name, color, size]);

            return <span ref={iconRef} className="inline-flex items-center justify-center shrink-0" style={{ width: size, height: size }} />;
        };

        // Componente para ilustraciones de preposiciones (Bola y Caja)
        const PrepositionIllustration = ({ id, className = "w-full h-full" }) => {
            const boxColor = "#cbd5e1"; 
            const ballColor = "#f43f5e"; 
            
            const illustrations = {
                101: ( <svg viewBox="0 0 100 100" className={className}><rect x="30" y="50" width="40" height="40" fill={boxColor} rx="4" /><circle cx="50" cy="25" r="12" fill={ballColor} /></svg> ),
                102: ( <svg viewBox="0 0 100 100" className={className}><rect x="30" y="20" width="40" height="40" fill={boxColor} rx="4" opacity="0.7" /><circle cx="50" cy="80" r="12" fill={ballColor} /><rect x="30" y="20" width="40" height="40" fill="none" stroke={boxColor} strokeWidth="2" rx="4" /></svg> ),
                103: ( <svg viewBox="0 0 100 100" className={className}><rect x="25" y="25" width="50" height="50" fill={boxColor} rx="4" opacity="0.5" /><circle cx="50" cy="50" r="12" fill={ballColor} /><rect x="25" y="25" width="50" height="50" fill="none" stroke={boxColor} strokeWidth="2" rx="4" /></svg> ),
                104: ( <svg viewBox="0 0 100 100" className={className}><rect x="15" y="35" width="40" height="40" fill={boxColor} rx="4" /><circle cx="75" cy="55" r="12" fill={ballColor} /></svg> ),
                105: ( <svg viewBox="0 0 100 100" className={className}><rect x="35" y="25" width="40" height="40" fill={boxColor} rx="4" /><circle cx="45" cy="70" r="15" fill={ballColor} /></svg> ),
                106: ( <svg viewBox="0 0 100 100" className={className}><circle cx="55" cy="35" r="12" fill={ballColor} /><rect x="25" y="45" width="40" height="40" fill={boxColor} rx="4" /></svg> ),
                107: ( <svg viewBox="0 0 100 100" className={className}><rect x="10" y="35" width="30" height="30" fill={boxColor} rx="4" /><rect x="60" y="35" width="30" height="30" fill={boxColor} rx="4" /><circle cx="50" cy="50" r="10" fill={ballColor} /></svg> ),
                108: ( <svg viewBox="0 0 100 100" className={className}><rect x="20" y="40" width="30" height="30" fill={boxColor} rx="4" /><circle cx="65" cy="55" r="10" fill={ballColor} /></svg> ),
                109: ( <svg viewBox="0 0 100 100" className={className}><rect x="10" y="70" width="20" height="20" fill={boxColor} rx="4" /><circle cx="85" cy="15" r="8" fill={ballColor} /></svg> ),
                110: ( <svg viewBox="0 0 100 100" className={className}><circle cx="25" cy="50" r="12" fill={ballColor} /><rect x="55" y="35" width="30" height="30" fill={boxColor} rx="4" /></svg> ),
                111: ( <svg viewBox="0 0 100 100" className={className}><rect x="15" y="35" width="30" height="30" fill={boxColor} rx="4" /><circle cx="75" cy="50" r="12" fill={ballColor} /></svg> ),
                112: ( <svg viewBox="0 0 100 100" className={className}><rect x="10" y="10" width="80" height="15" fill="#e2e8f0" rx="2" /><rect x="35" y="35" width="30" height="30" fill={boxColor} rx="4" /><rect x="35" y="75" width="30" height="20" fill={ballColor} rx="4" opacity="0.8" /></svg> ),
            };
            return illustrations[id] || null;
        };

        const DATA_SERVICE = [
            { id: 1, en: "Would you like coffee or tea?", es: "¿Quiere café o té?", pron: "Kee-eh-re kah-feh oh teh?", icon: "coffee" },
            { id: 2, en: "Sugar or milk?", es: "¿Azúcar o leche?", pron: "Ah-soo-kar oh leh-cheh?", icon: "coffee" },
            { id: 3, en: "Careful, it's hot!", es: "¡Cuidado, está caliente!", pron: "Kwee-dah-doh, es-tah kah-lee-en-teh", icon: "info" },
            { id: 4, en: "Enjoy your meal!", es: "¡Buen provecho!", pron: "Bwen pro-veh-choh", icon: "utensils" },
            { id: 5, en: "Good morning", es: "Buenos días", pron: "Bweh-nohs dee-ahs", icon: "heart" },
            { id: 6, en: "How can I help you?", es: "¿Cómo puedo ayudarle?", pron: "Koh-moh pweh-doh ah-yoo-dar-leh?", icon: "heart" },
        ];

        const DATA_PREP = [
            { id: 101, en: "Up / Above", es: "Arriba / Encima", pron: "Ah-rree-bah" },
            { id: 102, en: "Down / Under", es: "Abajo / Debajo", pron: "Ah-bah-ho" },
            { id: 103, en: "Inside", es: "Adentro / Dentro", pron: "Ah-den-troh" },
            { id: 104, en: "Next to", es: "Al lado de", pron: "Al lah-doh deh" },
            { id: 105, en: "In front of", es: "En frente de", pron: "En fren-teh deh" },
            { id: 106, en: "Behind", es: "Atrás / Detrás", pron: "Ah-trahs" },
        ];

        const App = () => {
            const [mode, setMode] = useState('menu'); // 'menu', 'service', 'prep'
            const [view, setView] = useState('game'); // 'game', 'cheat-sheet'
            const [cards, setCards] = useState([]);
            const [flipped, setFlipped] = useState([]);
            const [solved, setSolved] = useState([]);
            const [disabled, setDisabled] = useState(false);

            const startGame = (gameType) => {
                const source = gameType === 'service' ? DATA_SERVICE : DATA_PREP;
                const gameCards = [];
                source.forEach(p => {
                    gameCards.push({ id: `en-${p.id}`, content: p.en, matchId: p.id, lang: 'EN' });
                    gameCards.push({ id: `es-${p.id}`, content: p.es, matchId: p.id, lang: 'ES' });
                });
                setCards(gameCards.sort(() => Math.random() - 0.5));
                setSolved([]);
                setFlipped([]);
                setDisabled(false);
                setMode(gameType);
                setView('game');
            };

            const handleCardClick = (id) => {
                if (disabled || flipped.includes(id) || solved.includes(id)) return;
                const newFlipped = [...flipped, id];
                setFlipped(newFlipped);

                if (newFlipped.length === 2) {
                    setDisabled(true);
                    const c1 = cards.find(c => c.id === newFlipped[0]);
                    const c2 = cards.find(c => c.id === newFlipped[1]);

                    if (c1.matchId === c2.matchId && c1.lang !== c2.lang) {
                        setSolved(prev => [...prev, c1.id, c2.id]);
                        setFlipped([]);
                        setDisabled(false);
                    } else {
                        setTimeout(() => { setFlipped([]); setDisabled(false); }, 1000);
                    }
                }
            };

            if (mode === 'menu') {
                return (
                    <div key="menu" className="min-h-screen flex flex-col items-center justify-center p-6 bg-slate-50 animate-card">
                        <Icon name="map-pin" color="#e11d48" size={48} />
                        <h1 className="text-4xl font-black text-slate-900 tracking-tighter uppercase mt-4 mb-2">Oppenheimer Hub</h1>
                        <p className="text-rose-600 font-bold italic mb-10 text-center uppercase tracking-widest text-xs">Centro de Actividades</p>
                        
                        <div className="grid gap-4 w-full max-w-sm">
                            <button onClick={() => startGame('service')} className="group bg-white p-6 rounded-3xl shadow-md hover:shadow-xl transition-all border-2 border-transparent hover:border-rose-500 flex items-center gap-4 text-left">
                                <div className="bg-rose-100 p-3 rounded-2xl group-hover:scale-110 transition-transform flex items-center justify-center">
                                    <Icon name="coffee" color="#e11d48" size={24} />
                                </div>
                                <div>
                                    <h2 className="font-black text-slate-800 uppercase leading-none">Servicio y Trato</h2>
                                    <p className="text-xs text-slate-500 mt-1">Frases de café y atención</p>
                                </div>
                            </button>

                            <button onClick={() => startGame('prep')} className="group bg-white p-6 rounded-3xl shadow-md hover:shadow-xl transition-all border-2 border-transparent hover:border-blue-500 flex items-center gap-4 text-left">
                                <div className="bg-blue-100 p-3 rounded-2xl group-hover:scale-110 transition-transform flex items-center justify-center">
                                    <Icon name="box" color="#3b82f6" size={24} />
                                </div>
                                <div>
                                    <h2 className="font-black text-slate-800 uppercase leading-none">Preposiciones</h2>
                                    <p className="text-xs text-slate-500 mt-1">Guía visual de ubicación</p>
                                </div>
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div key={mode} className="min-h-screen bg-slate-50 p-4 md:p-8 animate-card">
                    <div className="max-w-4xl mx-auto">
                        <button onClick={() => setMode('menu')} className="mb-6 flex items-center gap-2 text-slate-400 font-bold uppercase text-xs hover:text-rose-600 transition-colors">
                            <Icon name="arrow-left" size={14} /> Volver al Menú
                        </button>

                        <header className="text-center mb-8">
                            <h1 className="text-3xl font-black text-slate-900 uppercase tracking-tighter leading-none">
                                {mode === 'service' ? 'Servicio y Trato' : 'Preposiciones Visuales'}
                            </h1>
                            <p className="text-rose-600 font-bold italic mt-2 uppercase tracking-widest text-[10px]">Oppenheimer Park</p>
                        </header>

                        <nav className="flex justify-center gap-2 mb-8">
                            <button onClick={() => setView('game')} className={`px-6 py-2 rounded-2xl font-bold text-sm transition-all ${view === 'game' ? 'bg-slate-900 text-white shadow-lg' : 'bg-white text-slate-400 border border-slate-200'}`}>Juego</button>
                            <button onClick={() => setView('cheat-sheet')} className={`px-6 py-2 rounded-2xl font-bold text-sm transition-all ${view === 'cheat-sheet' ? 'bg-slate-900 text-white shadow-lg' : 'bg-white text-slate-400 border border-slate-200'}`}>Estudiar</button>
                        </nav>

                        {view === 'game' && (
                            <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
                                {cards.map(card => (
                                    <div key={card.id} className="h-32 perspective-1000" onClick={() => handleCardClick(card.id)}>
                                        <div className="relative w-full h-full transition-all duration-500 preserve-3d cursor-pointer"
                                             style={{ transform: (flipped.includes(card.id) || solved.includes(card.id)) ? 'rotateY(180deg)' : 'none' }}>
                                            <div className="absolute inset-0 bg-white border-2 border-slate-100 rounded-2xl flex items-center justify-center backface-hidden shadow-sm">
                                                <span className="text-slate-100 font-black text-3xl">?</span>
                                            </div>
                                            <div className={`absolute inset-0 rotateY-180 backface-hidden rounded-2xl border-2 p-3 flex flex-col items-center justify-center text-center shadow-md ${card.lang === 'EN' ? 'bg-blue-50 border-blue-300' : 'bg-rose-50 border-rose-300'}`}
                                                 style={{ transform: 'rotateY(180deg)' }}>
                                                {mode === 'prep' && <div className="w-10 h-10 mb-1 opacity-60"><PrepositionIllustration id={card.matchId} /></div>}
                                                <p className="text-[8px] font-bold uppercase opacity-50 mb-1 leading-none">{card.lang}</p>
                                                <p className={`font-bold text-slate-800 leading-tight ${card.content.length > 20 ? 'text-[9px]' : 'text-[11px]'}`}>{card.content}</p>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'cheat-sheet' && (
                            <div className="grid gap-3">
                                {(mode === 'service' ? DATA_SERVICE : DATA_PREP).map(p => (
                                    <div key={p.id} className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm flex items-center gap-6 animate-card">
                                        <div className="w-14 h-14 bg-slate-50 rounded-2xl flex items-center justify-center shrink-0 border border-slate-50 p-2">
                                            {mode === 'service' ? <Icon name={p.icon} color="#e11d48" size={28} /> : <PrepositionIllustration id={p.id} />}
                                        </div>
                                        <div className="flex-grow grid md:grid-cols-2 gap-4">
                                            <div>
                                                <p className="text-[9px] font-black text-blue-500 uppercase tracking-widest leading-none mb-1">English</p>
                                                <p className="text-lg font-black text-slate-800">{p.en}</p>
                                            </div>
                                            <div>
                                                <p className="text-[9px] font-black text-rose-500 uppercase tracking-widest leading-none mb-1">Español</p>
                                                <p className="text-lg font-black text-slate-900">{p.es}</p>
                                                <p className="text-[10px] text-rose-400 font-bold italic mt-1 leading-none">Pron: {p.pron}</p>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                        
                        <div className="mt-10 text-center">
                            <button onClick={() => startGame(mode)} className="bg-white border-2 border-slate-200 text-slate-400 px-6 py-2 rounded-full font-bold uppercase text-[10px] tracking-widest hover:border-slate-400 hover:text-slate-600 transition-all flex items-center gap-2 mx-auto">
                                <Icon name="refresh-cw" size={14} color="currentColor" /> Reiniciar {mode === 'service' ? 'Juego' : 'Actividad'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
