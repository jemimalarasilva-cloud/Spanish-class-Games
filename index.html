<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service & Care - Oppenheimer Park</title>
    <!-- Stable Production Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-card { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root">
        <div class="flex items-center justify-center min-h-screen">
            <div class="text-center">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-rose-600 mb-4"></div>
                <p class="text-slate-500 font-bold">Cargando...</p>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const Icon = ({ name, color, size = 24 }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ color, width: size, height: size }}></i>;
        };

        const PHRASES = [
            { id: 1, en: "Would you like coffee or tea?", es: "¿Quiere café o té?" },
            { id: 2, en: "Sugar or milk?", es: "¿Azúcar o leche?" },
            { id: 3, en: "Careful, it's hot!", es: "¡Cuidado, está caliente!" },
            { id: 4, en: "Enjoy your meal!", es: "¡Buen provecho!" },
            { id: 5, en: "Good morning", es: "Buenos días" },
            { id: 6, en: "How can I help you?", es: "¿Cómo puedo ayudarle?" },
            { id: 7, en: "Take a seat, please", es: "Tome asiento, por favor" },
            { id: 8, en: "Do you want more?", es: "¿Quiere más?" },
            { id: 10, en: "See you tomorrow", es: "Nos vemos mañana" },
            { id: 11, en: "See you next week", es: "Nos vemos la próxima semana" }
        ];

        const App = () => {
            const [cards, setCards] = useState([]);
            const [flipped, setFlipped] = useState([]);
            const [solved, setSolved] = useState([]);
            const [disabled, setDisabled] = useState(false);

            const initGame = useCallback(() => {
                const gameCards = [];
                PHRASES.forEach(p => {
                    gameCards.push({ id: `en-${p.id}`, content: p.en, matchId: p.id, lang: 'EN' });
                    gameCards.push({ id: `es-${p.id}`, content: p.es, matchId: p.id, lang: 'ES' });
                });
                setCards(gameCards.sort(() => Math.random() - 0.5));
                setSolved([]);
                setFlipped([]);
                setDisabled(false);
            }, []);

            useEffect(() => { initGame(); }, [initGame]);

            const handleClick = (id) => {
                if (disabled || flipped.includes(id) || solved.includes(id)) return;
                const newFlipped = [...flipped, id];
                setFlipped(newFlipped);

                if (newFlipped.length === 2) {
                    setDisabled(true);
                    const c1 = cards.find(c => c.id === newFlipped[0]);
                    const c2 = cards.find(c => c.id === newFlipped[1]);

                    if (c1.matchId === c2.matchId && c1.lang !== c2.lang) {
                        setSolved([...solved, c1.id, c2.id]);
                        setFlipped([]);
                        setDisabled(false);
                    } else {
                        setTimeout(() => {
                            setFlipped([]);
                            setDisabled(false);
                        }, 1000);
                    }
                }
            };

            return (
                <div className="min-h-screen py-10 px-4">
                    <div className="max-w-4xl mx-auto">
                        <header className="text-center mb-10">
                            <h1 className="text-4xl font-black text-slate-900 uppercase tracking-tighter">Service & Care</h1>
                            <p className="text-rose-600 font-bold italic">Oppenheimer Park</p>
                        </header>

                        <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
                            {cards.map((card, i) => (
                                <div key={card.id} className="h-32 perspective-1000" onClick={() => handleClick(card.id)}>
                                    <div className="relative w-full h-full transition-all duration-500 preserve-3d cursor-pointer"
                                         style={{ transform: (flipped.includes(card.id) || solved.includes(card.id)) ? 'rotateY(180deg)' : 'none' }}>
                                        <div className="absolute inset-0 bg-white border-2 border-slate-200 rounded-xl flex items-center justify-center backface-hidden shadow-sm">
                                            <span className="text-slate-200 font-bold text-3xl">?</span>
                                        </div>
                                        <div className={`absolute inset-0 rotateY-180 backface-hidden rounded-xl border-2 p-3 flex flex-col items-center justify-center text-center shadow-md ${card.lang === 'EN' ? 'bg-blue-50 border-blue-300' : 'bg-rose-50 border-rose-300'}`}
                                             style={{ transform: 'rotateY(180deg)' }}>
                                            <p className="text-[9px] font-bold uppercase opacity-50 mb-1">{card.lang}</p>
                                            <p className="text-xs font-bold text-slate-800 leading-tight">{card.content}</p>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div className="mt-12 text-center">
                            <button onClick={initGame} className="bg-slate-900 text-white px-8 py-3 rounded-full font-bold uppercase tracking-widest flex items-center gap-2 mx-auto shadow-lg active:scale-95">
                                <Icon name="refresh-cw" color="white" size={18} /> Reiniciar
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
