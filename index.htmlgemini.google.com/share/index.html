<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service & Care - Oppenheimer Park</title>
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- CDNs de React y ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel para procesar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Iconos de Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        @media print { .print-hidden { display: none !important; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;
        
        // Componente de Icono para usar Lucide en el navegador
        const Icon = ({ name, color, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className} style={{ color: color, width: size, height: size }}></i>;
        };

        const INITIAL_PHRASES = [
            { id: 1, en: "Would you like coffee or tea?", es: "¿Quiere café o té?", pron: "Kee-eh-re kah-feh oh teh?", icon: "coffee", iconColor: "#b45309" },
            { id: 2, en: "Sugar or milk?", es: "¿Azúcar o leche?", pron: "Ah-soo-kar oh leh-cheh?", icon: "coffee", iconColor: "#f59e0b" },
            { id: 3, en: "Careful, it's hot!", es: "¡Cuidado, está caliente!", pron: "Kwee-dah-doh, es-tah kah-lee-en-teh", icon: "info", iconColor: "#ef4444" },
            { id: 4, en: "Enjoy your meal!", es: "¡Buen provecho!", pron: "Bwen pro-veh-choh", icon: "utensils", iconColor: "#16a34a" },
            { id: 5, en: "Good morning", es: "Buenos días", pron: "Bweh-nohs dee-ahs", icon: "heart", iconColor: "#ec4899" },
            { id: 6, en: "How can I help you?", es: "¿Cómo puedo ayudarle?", pron: "Koh-moh pweh-doh ah-yoo-dar-leh?", icon: "heart", iconColor: "#3b82f6" },
            { id: 7, en: "Take a seat, please", es: "Tome asiento, por favor", pron: "Toh-meh ah-see-en-toh, por fah-vor", icon: "utensils", iconColor: "#6366f1" },
            { id: 8, en: "Do you want more?", es: "¿Quiere más?", pron: "Kee-eh-re mahs?", icon: "utensils", iconColor: "#f97316" },
            { id: 9, en: "What time is it?", es: "¿Qué hora es?", pron: "Keh oh-rah es?", icon: "clock", iconColor: "#64748b" },
            { id: 10, en: "See you tomorrow", es: "Nos vemos mañana", pron: "Nohs veh-mohs mah-nyah-nah", icon: "clock", iconColor: "#10b981" },
            { id: 11, en: "See you next week", es: "Nos vemos la próxima semana", pron: "Nohs veh-mohs lah prohk-see-mah seh-mah-nah", icon: "clock", iconColor: "#06b6d4" },
        ];

        const App = () => {
            const [view, setView] = useState('game');
            const [speechRate, setSpeechRate] = useState(0.6);
            const [cards, setCards] = useState([]);
            const [flipped, setFlipped] = useState([]);
            const [solved, setSolved] = useState([]);
            const [disabled, setDisabled] = useState(false);

            const speak = (text) => {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'es-ES';
                utterance.rate = speechRate;
                window.speechSynthesis.speak(utterance);
            };

            const isFlipped = (id) => flipped.includes(id) || solved.includes(id);

            const initializeGame = useCallback(() => {
                const gameCards = [];
                INITIAL_PHRASES.forEach((phrase) => {
                    gameCards.push({ id: `en-${phrase.id}`, content: phrase.en, matchId: phrase.id, lang: 'EN', original: phrase });
                    gameCards.push({ id: `es-${phrase.id}`, content: phrase.es, matchId: phrase.id, lang: 'ES', original: phrase });
                });
                setCards(gameCards.sort(() => Math.random() - 0.5));
                setSolved([]);
                setFlipped([]);
                setDisabled(false);
            }, []);

            useEffect(() => {
                initializeGame();
            }, [initializeGame]);

            const handleCardClick = (id) => {
                if (disabled || isFlipped(id)) return;
                const card = cards.find(c => c.id === id);
                if (card.lang === 'ES') speak(card.content);
                const newFlipped = [...flipped, id];
                setFlipped(newFlipped);
                if (newFlipped.length === 2) {
                    setDisabled(true);
                    const firstCard = cards.find(c => c.id === newFlipped[0]);
                    const secondCard = cards.find(c => c.id === newFlipped[1]);
                    if (firstCard.matchId === secondCard.matchId && firstCard.lang !== secondCard.lang) {
                        setSolved(prev => [...prev, firstCard.id, secondCard.id]);
                        setFlipped([]);
                        setDisabled(false);
                    } else {
                        setTimeout(() => {
                            setFlipped([]);
                            setDisabled(false);
                        }, 1200);
                    }
                }
            };

            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-8 font-sans print:bg-white print:p-0">
                    <div className="max-w-4xl mx-auto">
                        <header className="mb-6 text-center print-hidden">
                            <Icon name="map-pin" color="#e11d48" size={24} className="mx-auto mb-2" />
                            <h1 className="text-3xl font-black text-slate-900 tracking-tighter uppercase">Service & Care</h1>
                            <p className="text-rose-600 font-bold italic">Oppenheimer Park Fieldhouse</p>
                        </header>

                        <nav className="flex flex-wrap justify-center gap-2 mb-8 print-hidden">
                            {['game', 'cheat-sheet', 'stickers'].map((tab) => (
                                <button 
                                    key={tab} 
                                    onClick={() => setView(tab)} 
                                    className={`px-5 py-2 rounded-2xl font-bold text-sm transition-all ${view === tab ? 'bg-rose-600 text-white shadow-lg' : 'bg-white text-slate-500 border border-slate-200'}`}
                                >
                                    {tab === 'game' ? 'Juego' : tab === 'cheat-sheet' ? 'Guía' : 'Stickers'}
                                </button>
                            ))}
                        </nav>

                        {view === 'game' && (
                            <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
                                {cards.map((card) => (
                                    <div 
                                        key={card.id} 
                                        onClick={() => handleCardClick(card.id)} 
                                        className={`relative h-44 cursor-pointer transition-all duration-500 preserve-3d ${isFlipped(card.id) ? '[transform:rotateY(180deg)]' : ''}`}
                                    >
                                        <div className="absolute inset-0 bg-white border-4 border-slate-100 rounded-3xl flex items-center justify-center backface-hidden shadow-sm font-black text-slate-200 text-4xl">?</div>
                                        <div className={`absolute inset-0 [transform:rotateY(180deg)] backface-hidden rounded-3xl border-4 p-4 flex flex-col items-center justify-center text-center shadow-lg ${card.lang === 'EN' ? 'bg-blue-50 border-blue-400' : 'bg-rose-50 border-rose-400'}`}>
                                            <span className="text-[10px] font-black uppercase mb-2 opacity-50">{card.lang === 'EN' ? 'English' : 'Español'}</span>
                                            <p className="text-sm font-black text-slate-900">{card.content}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'cheat-sheet' && (
                            <div className="space-y-4">
                                {INITIAL_PHRASES.map((phrase) => (
                                    <div key={phrase.id} className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 flex items-center gap-6">
                                        <div className="p-4 bg-slate-50 rounded-2xl">
                                            <Icon name={phrase.icon} color={phrase.iconColor} size={24} />
                                        </div>
                                        <div className="flex-grow grid md:grid-cols-2 gap-4">
                                            <div><p className="text-[10px] font-black text-blue-500 uppercase tracking-widest">English</p><p className="text-xl font-bold">{phrase.en}</p></div>
                                            <div>
                                                <p className="text-[10px] font-black text-rose-500 uppercase tracking-widest">Español</p>
                                                <div className="flex items-center gap-2">
                                                    <p className="text-2xl font-black">{phrase.es}</p>
                                                    <button onClick={() => speak(phrase.es)} className="p-2 bg-rose-50 text-rose-600 rounded-full hover:bg-rose-100 transition shadow-sm">
                                                        <Icon name="volume-2" color="#e11d48" size={20} />
                                                    </button>
                                                </div>
                                                <p className="text-xs text-rose-400 font-bold italic">Pron: {phrase.pron}</p>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'stickers' && (
                            <div className="grid grid-cols-2 gap-8 p-4">
                                {INITIAL_PHRASES.map(p => (
                                    <div key={p.id} className="aspect-square bg-white border-4 border-dashed border-slate-300 rounded-full flex flex-col items-center justify-center p-6 text-center shadow-sm">
                                        <div className="mb-2 opacity-20">
                                            <Icon name={p.icon} color={p.iconColor} size={48} />
                                        </div>
                                        <p className="text-[10px] font-black text-blue-500 uppercase leading-none mb-1 tracking-widest">{p.en}</p>
                                        <p className="text-xl font-black text-slate-900 border-y-2 border-slate-50 w-full py-1">{p.es}</p>
                                        <p className="text-[10px] text-rose-500 font-bold italic">"{p.pron}"</p>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
